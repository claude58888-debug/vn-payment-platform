server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: vn-payment-platform

  datasource:
    url: jdbc:mysql://localhost:3306/vn_payment?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.vnpay.platform.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.vnpay.platform: DEBUG
    com.baomidou.mybatisplus: DEBUG

# Platform configuration
platform:
  snowflake:
    worker-id: 1
    datacenter-id: 1
  callback:
    max-retry: 6
    retry-intervals: 0,30,120,600,3600
  settlement:
    risk-reserve-rate: 0.02
  risk:
    max-daily-failures: 10
    cross-region-threshold: 3
