<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('结算管理')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<script th:inline="javascript">document.querySelector('.sidebar .nav-link[href="/dashboard/settlement"]').classList.add('active');</script>
<div class="main-content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h3><i class="bi bi-cash-stack me-2"></i>结算管理</h3>
            <p class="text-secondary mb-0">每日结算批次和手动结算</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#triggerModal">
            <i class="bi bi-play-fill me-1"></i> 手动触发结算
        </button>
    </div>

    <!-- Filters -->
    <div class="card card-dark mb-4">
        <div class="card-body">
            <form method="get" class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label text-secondary">商户</label>
                    <select class="form-select" name="merchantId">
                        <option value="">全部</option>
                        <option th:each="m : ${merchants}" th:value="${m.merchantId}" th:text="${m.merchantName}" th:selected="${merchantIdFilter == m.merchantId}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label text-secondary">状态</label>
                    <select class="form-select" name="status">
                        <option value="">全部</option>
                        <option value="PENDING" th:selected="${statusFilter == 'PENDING'}">待处理</option>
                        <option value="PROCESSING" th:selected="${statusFilter == 'PROCESSING'}">处理中</option>
                        <option value="COMPLETED" th:selected="${statusFilter == 'COMPLETED'}">已完成</option>
                        <option value="FAILED" th:selected="${statusFilter == 'FAILED'}">失败</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search me-1"></i>查询</button>
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-outline-light w-100" onclick="exportCSV()"><i class="bi bi-download me-1"></i>导出报表</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settlement Table -->
    <div class="card card-dark">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark-custom mb-0" id="settlementTable">
                    <thead>
                        <tr><th>批次ID</th><th>商户ID</th><th>结算日期</th><th>总金额(VND)</th><th>手续费(VND)</th><th>净额(VND)</th><th>风险准备金</th><th>状态</th><th>操作</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="b : ${batches}">
                            <td><code th:text="${b.batchId}"></code></td>
                            <td th:text="${b.merchantId}"></td>
                            <td th:text="${b.settlementDate}"></td>
                            <td th:text="${b.totalAmountVnd != null} ? ${#numbers.formatDecimal(b.totalAmountVnd, 0, 'COMMA', 2, 'POINT')} : '-'"></td>
                            <td th:text="${b.feeAmountVnd != null} ? ${#numbers.formatDecimal(b.feeAmountVnd, 0, 'COMMA', 2, 'POINT')} : '-'"></td>
                            <td th:text="${b.netAmountVnd != null} ? ${#numbers.formatDecimal(b.netAmountVnd, 0, 'COMMA', 2, 'POINT')} : '-'"></td>
                            <td th:text="${b.riskReserveVnd != null} ? ${#numbers.formatDecimal(b.riskReserveVnd, 0, 'COMMA', 2, 'POINT')} : '-'"></td>
                            <td>
                                <span class="badge badge-status"
                                      th:classappend="${b.status == 'COMPLETED'} ? 'badge-success' : (${b.status == 'PENDING'} ? 'badge-warning' : (${b.status == 'PROCESSING'} ? 'badge-info' : 'badge-danger'))"
                                      th:text="${b.status}"></span>
                            </td>
                            <td>
                                <a th:href="@{/dashboard/settlement/{id}(id=${b.batchId})}" class="btn btn-sm btn-outline-light"><i class="bi bi-eye"></i></a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(batches)}">
                            <td colspan="9" class="text-center text-secondary py-4">暂无数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Trigger Settlement Modal -->
<div class="modal fade" id="triggerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="background: var(--sidebar-bg); border: 1px solid var(--border-color);">
            <div class="modal-header border-bottom" style="border-color: var(--border-color) !important;">
                <h5 class="modal-title text-light">手动触发结算</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form method="post" th:action="@{/dashboard/settlement/trigger}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label text-secondary">商户</label>
                        <select class="form-select" name="merchantId" required>
                            <option th:each="m : ${merchants}" th:value="${m.merchantId}" th:text="${m.merchantName}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary">结算日期</label>
                        <input type="date" class="form-control" name="date" required>
                    </div>
                </div>
                <div class="modal-footer border-top" style="border-color: var(--border-color) !important;">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">触发结算</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function exportCSV() {
    const table = document.getElementById('settlementTable');
    let csv = [];
    const rows = table.querySelectorAll('tr');
    for (const row of rows) {
        const cols = row.querySelectorAll('td, th');
        const rowData = [];
        for (const col of cols) { rowData.push('"' + col.textContent.trim().replace(/"/g, '""') + '"'); }
        csv.push(rowData.join(','));
    }
    const blob = new Blob(['\ufeff' + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'settlement_' + new Date().toISOString().slice(0,10) + '.csv';
    link.click();
}
</script>
</body>
</html>
