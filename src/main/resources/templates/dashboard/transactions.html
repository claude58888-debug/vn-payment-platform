<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('交易管理')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<script th:inline="javascript">document.querySelector('.sidebar .nav-link[href="/dashboard/transactions"]').classList.add('active');</script>
<div class="main-content">
    <div class="page-header">
        <h3><i class="bi bi-receipt me-2"></i>交易管理</h3>
        <p class="text-secondary mb-0">查看和管理所有支付交易</p>
    </div>

    <!-- Filters -->
    <div class="card card-dark mb-4">
        <div class="card-body">
            <form method="get" class="row g-2 align-items-end">
                <div class="col-md-2">
                    <label class="form-label text-secondary">状态</label>
                    <select class="form-select" name="status">
                        <option value="">全部</option>
                        <option value="CREATED" th:selected="${statusFilter == 'CREATED'}">已创建</option>
                        <option value="PROCESSING" th:selected="${statusFilter == 'PROCESSING'}">处理中</option>
                        <option value="SUCCESS_PENDING_RECON" th:selected="${statusFilter == 'SUCCESS_PENDING_RECON'}">成功待对账</option>
                        <option value="SUCCESS_CONFIRMED" th:selected="${statusFilter == 'SUCCESS_CONFIRMED'}">已确认</option>
                        <option value="FAILED" th:selected="${statusFilter == 'FAILED'}">失败</option>
                        <option value="UNKNOWN" th:selected="${statusFilter == 'UNKNOWN'}">未知</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label text-secondary">商户</label>
                    <select class="form-select" name="merchantId">
                        <option value="">全部</option>
                        <option th:each="m : ${merchants}" th:value="${m.merchantId}" th:text="${m.merchantName}" th:selected="${merchantIdFilter == m.merchantId}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label text-secondary">开始日期</label>
                    <input type="date" class="form-control" name="startDate" th:value="${startDate}">
                </div>
                <div class="col-md-2">
                    <label class="form-label text-secondary">结束日期</label>
                    <input type="date" class="form-control" name="endDate" th:value="${endDate}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search me-1"></i>查询</button>
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-outline-light w-100" onclick="exportCSV()"><i class="bi bi-download me-1"></i>导出CSV</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Transaction Table -->
    <div class="card card-dark">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark-custom mb-0" id="txTable">
                    <thead>
                        <tr>
                            <th>交易ID</th>
                            <th>商户ID</th>
                            <th>商户订单号</th>
                            <th>金额(VND)</th>
                            <th>支付方式</th>
                            <th>通道</th>
                            <th>确认来源</th>
                            <th>状态</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="t : ${transactions}">
                            <td><code th:text="${t.transactionId}"></code></td>
                            <td th:text="${t.merchantId}"></td>
                            <td th:text="${t.merchantOrderId}"></td>
                            <td th:text="${#numbers.formatDecimal(t.amount, 0, 'COMMA', 0, 'POINT')}"></td>
                            <td th:text="${t.payMethod}"></td>
                            <td th:text="${t.channelId}"></td>
                            <td><span class="badge badge-status badge-info" th:text="${t.matchSource}" th:if="${t.matchSource != null}"></span></td>
                            <td>
                                <span class="badge badge-status"
                                      th:classappend="${t.status.startsWith('SUCCESS')} ? 'badge-success' : (${t.status == 'FAILED'} ? 'badge-danger' : (${t.status == 'PROCESSING'} ? 'badge-warning' : 'badge-secondary'))"
                                      th:text="${t.status}"></span>
                            </td>
                            <td th:text="${#temporals.format(t.createdAt, 'MM-dd HH:mm:ss')}"></td>
                            <td>
                                <a th:href="@{/dashboard/transactions/{id}(id=${t.transactionId})}" class="btn btn-sm btn-outline-light">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(transactions)}">
                            <td colspan="10" class="text-center text-secondary py-4">暂无数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function exportCSV() {
    const table = document.getElementById('txTable');
    let csv = [];
    const rows = table.querySelectorAll('tr');
    for (const row of rows) {
        const cols = row.querySelectorAll('td, th');
        const rowData = [];
        for (const col of cols) { rowData.push('"' + col.textContent.trim().replace(/"/g, '""') + '"'); }
        csv.push(rowData.join(','));
    }
    const blob = new Blob(['\ufeff' + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'transactions_' + new Date().toISOString().slice(0,10) + '.csv';
    link.click();
}
</script>
</body>
</html>
