<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('商户管理')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<script th:inline="javascript">document.querySelector('.sidebar .nav-link[href="/dashboard/merchants"]').classList.add('active');</script>
<div class="main-content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h3><i class="bi bi-building me-2"></i>商户管理</h3>
            <p class="text-secondary mb-0">管理所有接入商户</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createModal">
            <i class="bi bi-plus-lg me-1"></i> 新建商户
        </button>
    </div>

    <!-- Search/Filter -->
    <div class="card card-dark mb-4">
        <div class="card-body">
            <form method="get" class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label text-secondary">搜索</label>
                    <input type="text" class="form-control" name="search" th:value="${search}" placeholder="商户名称或ID">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-secondary">状态</label>
                    <select class="form-select" name="status">
                        <option value="">全部</option>
                        <option value="ACTIVE" th:selected="${statusFilter == 'ACTIVE'}">活跃</option>
                        <option value="SUSPENDED" th:selected="${statusFilter == 'SUSPENDED'}">暂停</option>
                        <option value="BLOCKED" th:selected="${statusFilter == 'BLOCKED'}">封禁</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search me-1"></i>查询</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Merchant Table -->
    <div class="card card-dark">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark-custom mb-0">
                    <thead>
                        <tr>
                            <th>商户ID</th>
                            <th>商户名称</th>
                            <th>联系人</th>
                            <th>费率</th>
                            <th>结算周期</th>
                            <th>风险等级</th>
                            <th>状态</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="m : ${merchants}">
                            <td><code th:text="${m.merchantId}"></code></td>
                            <td th:text="${m.merchantName}"></td>
                            <td th:text="${m.contactName}"></td>
                            <td th:text="${#numbers.formatDecimal(m.feeRate * 100, 1, 2) + '%'}"></td>
                            <td th:text="${m.settlementCycle}"></td>
                            <td>
                                <span class="badge badge-status" th:classappend="${m.riskLevel == 'HIGH'} ? 'badge-danger' : (${m.riskLevel == 'NORMAL'} ? 'badge-info' : 'badge-success')" th:text="${m.riskLevel}"></span>
                            </td>
                            <td>
                                <span class="badge badge-status" th:classappend="${m.status == 'ACTIVE'} ? 'badge-success' : (${m.status == 'SUSPENDED'} ? 'badge-warning' : 'badge-danger')" th:text="${m.status}"></span>
                            </td>
                            <td th:text="${#temporals.format(m.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                            <td>
                                <a th:href="@{/dashboard/merchants/{id}(id=${m.merchantId})}" class="btn btn-sm btn-outline-light">
                                    <i class="bi bi-eye"></i> 详情
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(merchants)}">
                            <td colspan="9" class="text-center text-secondary py-4">暂无数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Create Merchant Modal -->
<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="background: var(--sidebar-bg); border: 1px solid var(--border-color);">
            <div class="modal-header border-bottom" style="border-color: var(--border-color) !important;">
                <h5 class="modal-title text-light">新建商户</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form method="post" th:action="@{/dashboard/merchants/create}">
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label text-secondary">商户名称 *</label>
                            <input type="text" class="form-control" name="merchantName" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-secondary">联系人</label>
                            <input type="text" class="form-control" name="contactName">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-secondary">联系电话</label>
                            <input type="text" class="form-control" name="contactPhone">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-secondary">联系邮箱</label>
                            <input type="email" class="form-control" name="contactEmail">
                        </div>
                        <div class="col-12">
                            <label class="form-label text-secondary">回调URL</label>
                            <input type="url" class="form-control" name="notifyUrl" placeholder="https://">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-secondary">费率</label>
                            <input type="number" class="form-control" name="feeRate" step="0.0001" placeholder="0.0100">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-secondary">结算周期</label>
                            <select class="form-select" name="settlementCycle">
                                <option value="T0">T0</option>
                                <option value="T1" selected>T1</option>
                                <option value="T2">T2</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-top" style="border-color: var(--border-color) !important;">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">创建商户</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
