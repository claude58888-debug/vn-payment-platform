<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('仪表盘')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<script th:inline="javascript">document.querySelector('.sidebar .nav-link[href="/dashboard"]').classList.add('active');</script>
<div class="main-content">
    <div class="page-header">
        <h3><i class="bi bi-speedometer2 me-2"></i>仪表盘</h3>
        <p class="text-secondary mb-0">平台运营数据概览</p>
    </div>

    <!-- Stats Row -->
    <div class="row g-3 mb-4">
        <div class="col-md-3 col-sm-6">
            <div class="stat-card">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="stat-label">今日交易总数</div>
                        <div class="stat-value" th:text="${totalToday}">0</div>
                    </div>
                    <i class="bi bi-receipt stat-icon text-primary"></i>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6">
            <div class="stat-card">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="stat-label">成功率</div>
                        <div class="stat-value"><span th:text="${successRate}">0</span>%</div>
                    </div>
                    <i class="bi bi-check-circle stat-icon text-success"></i>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6">
            <div class="stat-card">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="stat-label">今日总金额 (VND)</div>
                        <div class="stat-value" style="font-size:22px;" th:text="${#numbers.formatDecimal(totalAmount, 0, 'COMMA', 0, 'POINT')}">0</div>
                    </div>
                    <i class="bi bi-cash stat-icon text-warning"></i>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6">
            <div class="stat-card">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="stat-label">活跃商户 / 待处理订单</div>
                        <div class="stat-value"><span th:text="${activeMerchants}">0</span> / <span th:text="${pendingOrders}">0</span></div>
                    </div>
                    <i class="bi bi-building stat-icon text-info"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts Row -->
    <div class="row g-3">
        <div class="col-lg-8">
            <div class="card card-dark">
                <div class="card-header">
                    <i class="bi bi-graph-up me-1"></i> 24小时交易量趋势
                </div>
                <div class="card-body">
                    <canvas id="volumeChart" height="120"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card card-dark">
                <div class="card-header">
                    <i class="bi bi-pie-chart me-1"></i> 通道分布
                </div>
                <div class="card-body">
                    <canvas id="channelChart" height="200"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const hourLabels = /*[[${hourLabels}]]*/ [];
    const hourCounts = /*[[${hourCounts}]]*/ [];
    const channelNames = /*[[${channelNames}]]*/ [];
    const channelCounts = /*[[${channelCounts}]]*/ [];

    new Chart(document.getElementById('volumeChart'), {
        type: 'line',
        data: {
            labels: hourLabels,
            datasets: [{
                label: '交易量',
                data: hourCounts,
                borderColor: '#6366f1',
                backgroundColor: 'rgba(99,102,241,0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 3,
                pointBackgroundColor: '#6366f1'
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' }, beginAtZero: true }
            }
        }
    });

    new Chart(document.getElementById('channelChart'), {
        type: 'doughnut',
        data: {
            labels: channelNames,
            datasets: [{
                data: channelCounts,
                backgroundColor: ['#6366f1', '#22c55e', '#eab308', '#3b82f6', '#ef4444', '#a855f7']
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 12, usePointStyle: true } }
            }
        }
    });
</script>
</body>
</html>
