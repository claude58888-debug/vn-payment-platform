<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('设备管理')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<script th:inline="javascript">document.querySelector('.sidebar .nav-link[href="/dashboard/devices"]').classList.add('active');</script>
<div class="main-content">
    <div class="page-header">
        <h3><i class="bi bi-phone me-2"></i>设备管理</h3>
        <p class="text-secondary mb-0">管理绑定设备和通知历史</p>
    </div>

    <!-- Filters -->
    <div class="card card-dark mb-4">
        <div class="card-body">
            <form method="get" class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label text-secondary">商户</label>
                    <select class="form-select" name="merchantId">
                        <option value="">全部</option>
                        <option th:each="m : ${merchants}" th:value="${m.merchantId}" th:text="${m.merchantName}" th:selected="${merchantIdFilter == m.merchantId}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label text-secondary">信任等级</label>
                    <select class="form-select" name="trustLevel">
                        <option value="">全部</option>
                        <option value="NEW" th:selected="${trustLevelFilter == 'NEW'}">新设备</option>
                        <option value="TRUSTED" th:selected="${trustLevelFilter == 'TRUSTED'}">可信</option>
                        <option value="SUSPICIOUS" th:selected="${trustLevelFilter == 'SUSPICIOUS'}">可疑</option>
                        <option value="BLOCKED" th:selected="${trustLevelFilter == 'BLOCKED'}">已封禁</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search me-1"></i>查询</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Device Table -->
    <div class="card card-dark mb-4">
        <div class="card-header"><i class="bi bi-phone me-1"></i> 绑定设备列表</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark-custom mb-0">
                    <thead>
                        <tr><th>设备ID</th><th>商户ID</th><th>设备Token</th><th>信任等级</th><th>匹配准确率</th><th>状态</th><th>绑定时间</th><th>操作</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="d : ${devices}">
                            <td><code th:text="${d.deviceId}"></code></td>
                            <td th:text="${d.merchantId}"></td>
                            <td><code style="font-size:11px;" th:text="${#strings.abbreviate(d.deviceToken, 20)}"></code></td>
                            <td>
                                <span class="badge badge-status"
                                      th:classappend="${d.trustLevel == 'TRUSTED'} ? 'badge-success' : (${d.trustLevel == 'SUSPICIOUS'} ? 'badge-warning' : (${d.trustLevel == 'BLOCKED'} ? 'badge-danger' : 'badge-secondary'))"
                                      th:text="${d.trustLevel}"></span>
                            </td>
                            <td th:text="${#numbers.formatDecimal(d.matchAccuracy * 100, 1, 1) + '%'}"></td>
                            <td>
                                <span class="badge badge-status" th:classappend="${d.status == 'ACTIVE'} ? 'badge-success' : 'badge-secondary'" th:text="${d.status}"></span>
                            </td>
                            <td th:text="${#temporals.format(d.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                            <td>
                                <form method="post" th:action="@{/dashboard/devices/{id}/toggle(id=${d.deviceId})}" style="display:inline;">
                                    <button type="submit" class="btn btn-sm" th:classappend="${d.status == 'ACTIVE'} ? 'btn-outline-danger' : 'btn-outline-success'"
                                            th:text="${d.status == 'ACTIVE'} ? '解绑' : '绑定'"></button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(devices)}">
                            <td colspan="8" class="text-center text-secondary py-4">暂无数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Notification History -->
    <div class="card card-dark">
        <div class="card-header"><i class="bi bi-bell me-1"></i> 最近通知记录 (最近50条)</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark-custom mb-0">
                    <thead>
                        <tr><th>通知ID</th><th>商户ID</th><th>设备ID</th><th>银行</th><th>标题</th><th>内容</th><th>接收时间</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="n : ${notifications}">
                            <td><code style="font-size:11px;" th:text="${#strings.abbreviate(n.notificationId, 16)}"></code></td>
                            <td th:text="${n.merchantId}"></td>
                            <td th:text="${n.deviceId}"></td>
                            <td th:text="${n.bankLabel}"></td>
                            <td th:text="${n.rawTitle}"></td>
                            <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" th:text="${n.rawText}"></td>
                            <td th:text="${#temporals.format(n.receivedAt, 'MM-dd HH:mm:ss')}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(notifications)}">
                            <td colspan="7" class="text-center text-secondary py-4">暂无数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
