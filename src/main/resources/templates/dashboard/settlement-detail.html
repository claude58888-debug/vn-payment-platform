<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('结算详情')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<script th:inline="javascript">document.querySelector('.sidebar .nav-link[href="/dashboard/settlement"]').classList.add('active');</script>
<div class="main-content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h3><i class="bi bi-cash-stack me-2"></i>结算详情</h3>
            <p class="text-secondary mb-0">批次ID: <code th:text="${batch.batchId}"></code></p>
        </div>
        <a th:href="@{/dashboard/settlement}" class="btn btn-outline-light"><i class="bi bi-arrow-left"></i> 返回</a>
    </div>

    <div class="row g-3">
        <div class="col-lg-6">
            <div class="card card-dark">
                <div class="card-header"><i class="bi bi-info-circle me-1"></i> 结算信息</div>
                <div class="card-body">
                    <table class="table table-dark-custom mb-0">
                        <tr><td class="text-secondary" style="width:140px;">批次ID</td><td><code th:text="${batch.batchId}"></code></td></tr>
                        <tr><td class="text-secondary">商户ID</td><td th:text="${batch.merchantId}"></td></tr>
                        <tr><td class="text-secondary">结算日期</td><td th:text="${batch.settlementDate}"></td></tr>
                        <tr><td class="text-secondary">状态</td><td><span class="badge badge-status" th:classappend="${batch.status == 'COMPLETED'} ? 'badge-success' : (${batch.status == 'PENDING'} ? 'badge-warning' : 'badge-info')" th:text="${batch.status}"></span></td></tr>
                        <tr><td class="text-secondary">银行参考号</td><td th:text="${batch.bankRef != null} ? ${batch.bankRef} : '-'"></td></tr>
                        <tr><td class="text-secondary">创建时间</td><td th:text="${#temporals.format(batch.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></td></tr>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card card-dark">
                <div class="card-header"><i class="bi bi-calculator me-1"></i> 费用明细</div>
                <div class="card-body">
                    <table class="table table-dark-custom mb-0">
                        <tr><td class="text-secondary" style="width:140px;">交易总额</td><td class="fw-bold" th:text="${batch.totalAmountVnd != null} ? ${#numbers.formatDecimal(batch.totalAmountVnd, 0, 'COMMA', 2, 'POINT')} + ' VND' : '-'"></td></tr>
                        <tr><td class="text-secondary">手续费</td><td class="text-danger" th:text="${batch.feeAmountVnd != null} ? '- ' + ${#numbers.formatDecimal(batch.feeAmountVnd, 0, 'COMMA', 2, 'POINT')} + ' VND' : '-'"></td></tr>
                        <tr><td class="text-secondary">风险准备金</td><td class="text-warning" th:text="${batch.riskReserveVnd != null} ? '- ' + ${#numbers.formatDecimal(batch.riskReserveVnd, 0, 'COMMA', 2, 'POINT')} + ' VND' : '-'"></td></tr>
                        <tr style="border-top: 2px solid var(--border-color);"><td class="text-secondary fw-bold">净结算额</td><td class="fw-bold text-success" th:text="${batch.netAmountVnd != null} ? ${#numbers.formatDecimal(batch.netAmountVnd, 0, 'COMMA', 2, 'POINT')} + ' VND' : '-'"></td></tr>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
