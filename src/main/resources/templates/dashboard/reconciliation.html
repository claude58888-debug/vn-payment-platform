<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('对账管理')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<script th:inline="javascript">document.querySelector('.sidebar .nav-link[href="/dashboard/reconciliation"]').classList.add('active');</script>
<div class="main-content">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h3><i class="bi bi-file-earmark-check me-2"></i>对账管理</h3>
            <p class="text-secondary mb-0">每日对账结果和手动对账</p>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#triggerModal">
            <i class="bi bi-play-fill me-1"></i> 手动触发对账
        </button>
    </div>

    <!-- Filters -->
    <div class="card card-dark mb-4">
        <div class="card-body">
            <form method="get" class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label text-secondary">通道</label>
                    <select class="form-select" name="channelId">
                        <option value="">全部</option>
                        <option th:each="c : ${channels}" th:value="${c.channelId}" th:text="${c.channelName}" th:selected="${channelIdFilter == c.channelId}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label text-secondary">开始日期</label>
                    <input type="date" class="form-control" name="startDate" th:value="${startDate}">
                </div>
                <div class="col-md-2">
                    <label class="form-label text-secondary">结束日期</label>
                    <input type="date" class="form-control" name="endDate" th:value="${endDate}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search me-1"></i>查询</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Reconciliation Table -->
    <div class="card card-dark">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark-custom mb-0">
                    <thead>
                        <tr><th>对账日期</th><th>通道ID</th><th>文件名</th><th>总记录</th><th>已匹配</th><th>未匹配</th><th>异常</th><th>状态</th><th>创建时间</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${records}">
                            <td th:text="${r.reconDate}"></td>
                            <td><code th:text="${r.channelId}"></code></td>
                            <td th:text="${r.fileName}"></td>
                            <td th:text="${r.totalRecords}"></td>
                            <td class="text-success" th:text="${r.matchedRecords}"></td>
                            <td class="text-warning" th:text="${r.unmatchedRecords}"></td>
                            <td class="text-danger" th:text="${r.exceptionRecords}"></td>
                            <td>
                                <span class="badge badge-status"
                                      th:classappend="${r.status == 'COMPLETED'} ? 'badge-success' : (${r.status == 'PROCESSING'} ? 'badge-info' : 'badge-warning')"
                                      th:text="${r.status}"></span>
                            </td>
                            <td th:text="${#temporals.format(r.createdAt, 'MM-dd HH:mm')}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(records)}">
                            <td colspan="9" class="text-center text-secondary py-4">暂无数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Trigger Reconciliation Modal -->
<div class="modal fade" id="triggerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="background: var(--sidebar-bg); border: 1px solid var(--border-color);">
            <div class="modal-header border-bottom" style="border-color: var(--border-color) !important;">
                <h5 class="modal-title text-light">手动触发对账</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form method="post" th:action="@{/dashboard/reconciliation/trigger}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label text-secondary">通道</label>
                        <select class="form-select" name="channelId" required>
                            <option th:each="c : ${channels}" th:value="${c.channelId}" th:text="${c.channelName}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary">对账日期</label>
                        <input type="date" class="form-control" name="date" required>
                    </div>
                </div>
                <div class="modal-footer border-top" style="border-color: var(--border-color) !important;">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">触发对账</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
