<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('风控中心')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<script th:inline="javascript">document.querySelector('.sidebar .nav-link[href="/dashboard/risk"]').classList.add('active');</script>
<div class="main-content">
    <div class="page-header">
        <h3><i class="bi bi-shield-exclamation me-2"></i>风控中心</h3>
        <p class="text-secondary mb-0">AML告警、风险权益和设备信任管理</p>
    </div>

    <!-- High Risk Merchants -->
    <div class="card card-dark mb-4">
        <div class="card-header"><i class="bi bi-exclamation-triangle me-1 text-danger"></i> 高风险商户</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark-custom mb-0">
                    <thead><tr><th>商户ID</th><th>商户名称</th><th>风险等级</th><th>日限额(VND)</th><th>单笔限额(VND)</th><th>状态</th></tr></thead>
                    <tbody>
                        <tr th:each="m : ${highRiskMerchants}">
                            <td><code th:text="${m.merchantId}"></code></td>
                            <td th:text="${m.merchantName}"></td>
                            <td><span class="badge badge-status badge-danger" th:text="${m.riskLevel}"></span></td>
                            <td th:text="${#numbers.formatInteger(m.dailyLimitVnd, 0, 'COMMA')}"></td>
                            <td th:text="${#numbers.formatInteger(m.singleLimitVnd, 0, 'COMMA')}"></td>
                            <td><span class="badge badge-status" th:classappend="${m.status == 'ACTIVE'} ? 'badge-success' : 'badge-warning'" th:text="${m.status}"></span></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(highRiskMerchants)}">
                            <td colspan="6" class="text-center text-secondary py-4">暂无高风险商户</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Risk Equity Dashboard -->
    <div class="card card-dark mb-4">
        <div class="card-header"><i class="bi bi-graph-down me-1 text-warning"></i> 商户风险权益</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark-custom mb-0">
                    <thead><tr><th>商户ID</th><th>商户名称</th><th>USDT余额</th><th>USDT冻结</th><th>标记价格</th><th>风险权益(VND)</th><th>状态</th></tr></thead>
                    <tbody>
                        <tr th:each="a : ${usdtAccounts}">
                            <td><code th:text="${a.merchantId}"></code></td>
                            <td th:text="${merchantMap.containsKey(a.merchantId)} ? ${merchantMap[a.merchantId].merchantName} : '-'"></td>
                            <td th:text="${a.usdtBalance}"></td>
                            <td th:text="${a.usdtFrozen}"></td>
                            <td th:text="${a.markPriceUsdtVnd}"></td>
                            <td>
                                <span th:classappend="${a.riskEquityVnd.compareTo(T(java.math.BigDecimal).valueOf(1000000)) < 0} ? 'text-danger fw-bold' : ''"
                                      th:text="${#numbers.formatDecimal(a.riskEquityVnd, 0, 'COMMA', 2, 'POINT')}"></span>
                            </td>
                            <td>
                                <span class="badge badge-status"
                                      th:classappend="${a.riskEquityVnd.compareTo(T(java.math.BigDecimal).valueOf(1000000)) < 0} ? 'badge-danger' : 'badge-success'"
                                      th:text="${a.riskEquityVnd.compareTo(T(java.math.BigDecimal).valueOf(1000000)) < 0} ? '低于阈值' : '正常'"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Suspicious Devices -->
    <div class="card card-dark">
        <div class="card-header"><i class="bi bi-phone-vibrate me-1 text-warning"></i> 可疑/封禁设备</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark-custom mb-0">
                    <thead><tr><th>设备ID</th><th>商户ID</th><th>信任等级</th><th>匹配准确率</th><th>状态</th><th>绑定时间</th></tr></thead>
                    <tbody>
                        <tr th:each="d : ${suspiciousDevices}">
                            <td><code th:text="${d.deviceId}"></code></td>
                            <td th:text="${d.merchantId}"></td>
                            <td><span class="badge badge-status" th:classappend="${d.trustLevel == 'BLOCKED'} ? 'badge-danger' : 'badge-warning'" th:text="${d.trustLevel}"></span></td>
                            <td th:text="${#numbers.formatDecimal(d.matchAccuracy * 100, 1, 1) + '%'}"></td>
                            <td><span class="badge badge-status" th:classappend="${d.status == 'ACTIVE'} ? 'badge-success' : 'badge-secondary'" th:text="${d.status}"></span></td>
                            <td th:text="${#temporals.format(d.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(suspiciousDevices)}">
                            <td colspan="6" class="text-center text-secondary py-4">暂无可疑设备</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
