<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('通道管理')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<script th:inline="javascript">document.querySelector('.sidebar .nav-link[href="/dashboard/channels"]').classList.add('active');</script>
<div class="main-content">
    <div class="page-header">
        <h3><i class="bi bi-diagram-3 me-2"></i>通道管理</h3>
        <p class="text-secondary mb-0">管理上游支付通道和熔断器状态</p>
    </div>

    <div class="card card-dark">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark-custom mb-0">
                    <thead>
                        <tr><th>通道ID</th><th>通道名称</th><th>类型</th><th>权重</th><th>成功率</th><th>平均延迟</th><th>费率</th><th>熔断器</th><th>状态</th><th>操作</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${channels}">
                            <td><code th:text="${c.channelId}"></code></td>
                            <td th:text="${c.channelName}"></td>
                            <td><span class="badge badge-status badge-info" th:text="${c.channelType}"></span></td>
                            <td>
                                <form method="post" th:action="@{/dashboard/channels/{id}/update(id=${c.channelId})}" class="d-flex align-items-center gap-1" style="width:120px;">
                                    <input type="number" class="form-control form-control-sm" name="weight" th:value="${c.weight}" style="width:70px;">
                                    <button type="submit" class="btn btn-sm btn-outline-light"><i class="bi bi-check"></i></button>
                                </form>
                            </td>
                            <td th:text="${#numbers.formatDecimal(c.successRate * 100, 1, 2) + '%'}"></td>
                            <td th:text="${c.avgLatencyMs} + 'ms'"></td>
                            <td th:text="${#numbers.formatDecimal(c.feeRate * 100, 1, 2) + '%'}"></td>
                            <td>
                                <span class="badge badge-status"
                                      th:classappend="${c.circuitBreakerStatus == 'CLOSED'} ? 'badge-success' : (${c.circuitBreakerStatus == 'OPEN'} ? 'badge-danger' : 'badge-warning')"
                                      th:text="${c.circuitBreakerStatus}"></span>
                                <form th:if="${c.circuitBreakerStatus != 'CLOSED'}" method="post" th:action="@{/dashboard/channels/{id}/reset-breaker(id=${c.channelId})}" style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-outline-success ms-1" title="重置熔断器"><i class="bi bi-arrow-counterclockwise"></i></button>
                                </form>
                            </td>
                            <td>
                                <span class="badge badge-status" th:classappend="${c.status == 'ACTIVE'} ? 'badge-success' : 'badge-secondary'" th:text="${c.status}"></span>
                            </td>
                            <td>
                                <form method="post" th:action="@{/dashboard/channels/{id}/toggle(id=${c.channelId})}" style="display:inline;">
                                    <button type="submit" class="btn btn-sm" th:classappend="${c.status == 'ACTIVE'} ? 'btn-outline-danger' : 'btn-outline-success'"
                                            th:text="${c.status == 'ACTIVE'} ? '禁用' : '启用'"></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Channel Capabilities -->
    <div class="card card-dark mt-4">
        <div class="card-header"><i class="bi bi-gear me-1"></i> 通道能力矩阵</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark-custom mb-0">
                    <thead>
                        <tr><th>通道</th><th>查询API</th><th>Webhook回调</th><th>对账文件</th><th>熔断阈值</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${channels}">
                            <td th:text="${c.channelName}"></td>
                            <td><i class="bi" th:classappend="${c.hasQueryApi} ? 'bi-check-circle text-success' : 'bi-x-circle text-danger'"></i></td>
                            <td><i class="bi" th:classappend="${c.hasWebhook} ? 'bi-check-circle text-success' : 'bi-x-circle text-danger'"></i></td>
                            <td><i class="bi" th:classappend="${c.hasReconFile} ? 'bi-check-circle text-success' : 'bi-x-circle text-danger'"></i></td>
                            <td>
                                <form method="post" th:action="@{/dashboard/channels/{id}/update(id=${c.channelId})}" class="d-flex align-items-center gap-1" style="width:120px;">
                                    <input type="number" class="form-control form-control-sm" name="circuitBreakerThreshold" th:value="${c.circuitBreakerThreshold}" style="width:70px;">
                                    <button type="submit" class="btn btn-sm btn-outline-light"><i class="bi bi-check"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
