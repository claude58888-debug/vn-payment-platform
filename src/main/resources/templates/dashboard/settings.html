<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('系统设置')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<script th:inline="javascript">document.querySelector('.sidebar .nav-link[href="/dashboard/settings"]').classList.add('active');</script>
<div class="main-content">
    <div class="page-header">
        <h3><i class="bi bi-gear me-2"></i>系统设置</h3>
        <p class="text-secondary mb-0">平台配置和管理员用户管理</p>
    </div>

    <div class="row g-4">
        <!-- Exchange Rate Config -->
        <div class="col-lg-6">
            <div class="card card-dark">
                <div class="card-header"><i class="bi bi-currency-exchange me-1"></i> 汇率配置</div>
                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label text-secondary">USDT/VND 标记价格</label>
                            <input type="number" class="form-control" step="0.01" value="25500.00" placeholder="例: 25500.00">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">汇率更新频率 (分钟)</label>
                            <input type="number" class="form-control" value="15" placeholder="例: 15">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">汇率浮动上限 (%)</label>
                            <input type="number" class="form-control" step="0.1" value="5.0" placeholder="例: 5.0">
                        </div>
                        <button type="button" class="btn btn-primary" onclick="alert('设置已保存（演示模式）')"><i class="bi bi-check me-1"></i>保存</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Fee Rate Config -->
        <div class="col-lg-6">
            <div class="card card-dark">
                <div class="card-header"><i class="bi bi-percent me-1"></i> 费率配置</div>
                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label text-secondary">默认商户费率 (%)</label>
                            <input type="number" class="form-control" step="0.01" value="1.50" placeholder="例: 1.50">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">最低交易金额 (VND)</label>
                            <input type="number" class="form-control" value="50000" placeholder="例: 50000">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">最高交易金额 (VND)</label>
                            <input type="number" class="form-control" value="50000000" placeholder="例: 50000000">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">风险准备金比例 (%)</label>
                            <input type="number" class="form-control" step="0.1" value="2.0" placeholder="例: 2.0">
                        </div>
                        <button type="button" class="btn btn-primary" onclick="alert('设置已保存（演示模式）')"><i class="bi bi-check me-1"></i>保存</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Settlement Config -->
        <div class="col-lg-6">
            <div class="card card-dark">
                <div class="card-header"><i class="bi bi-clock me-1"></i> 结算配置</div>
                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label text-secondary">默认结算周期 (天)</label>
                            <select class="form-select">
                                <option>T+0 (当日结算)</option>
                                <option selected>T+1 (次日结算)</option>
                                <option>T+2 (两日后结算)</option>
                                <option>T+7 (周结)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">自动结算时间</label>
                            <input type="time" class="form-control" value="02:00">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">最低结算金额 (VND)</label>
                            <input type="number" class="form-control" value="100000" placeholder="例: 100000">
                        </div>
                        <button type="button" class="btn btn-primary" onclick="alert('设置已保存（演示模式）')"><i class="bi bi-check me-1"></i>保存</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Security Config -->
        <div class="col-lg-6">
            <div class="card card-dark">
                <div class="card-header"><i class="bi bi-shield-lock me-1"></i> 安全配置</div>
                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label text-secondary">API签名超时 (秒)</label>
                            <input type="number" class="form-control" value="300" placeholder="例: 300">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">回调重试次数</label>
                            <input type="number" class="form-control" value="5" placeholder="例: 5">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary">IP白名单 (每行一个)</label>
                            <textarea class="form-control" rows="3" placeholder="例: 10.0.0.0/24"></textarea>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="alert('设置已保存（演示模式）')"><i class="bi bi-check me-1"></i>保存</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Admin User Management -->
        <div class="col-12">
            <div class="card card-dark">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-people me-1"></i> 管理员账户</span>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-dark-custom mb-0">
                            <thead><tr><th>用户名</th><th>角色</th><th>创建时间</th><th>状态</th></tr></thead>
                            <tbody>
                                <tr>
                                    <td><i class="bi bi-person-circle me-1"></i> admin</td>
                                    <td><span class="badge badge-status badge-info">超级管理员</span></td>
                                    <td>系统内置</td>
                                    <td><span class="badge badge-status badge-success">启用</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
