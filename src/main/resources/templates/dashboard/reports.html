<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('数据报表')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<script th:inline="javascript">document.querySelector('.sidebar .nav-link[href="/dashboard/reports"]').classList.add('active');</script>
<div class="main-content">
    <div class="page-header">
        <h3><i class="bi bi-bar-chart-line me-2"></i>数据报表</h3>
        <p class="text-secondary mb-0">交易汇总和收入报表</p>
    </div>

    <!-- Date Filter -->
    <div class="card card-dark mb-4">
        <div class="card-body">
            <form method="get" class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label text-secondary">开始日期</label>
                    <input type="date" class="form-control" name="startDate" th:value="${startDate}">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-secondary">结束日期</label>
                    <input type="date" class="form-control" name="endDate" th:value="${endDate}">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search me-1"></i>查询</button>
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-outline-light w-100" onclick="exportMerchantCSV()"><i class="bi bi-download me-1"></i>导出商户报表</button>
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-outline-light w-100" onclick="exportChannelCSV()"><i class="bi bi-download me-1"></i>导出通道报表</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Merchant Summary -->
    <div class="card card-dark mb-4">
        <div class="card-header"><i class="bi bi-building me-1"></i> 商户交易汇总</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark-custom mb-0" id="merchantTable">
                    <thead><tr><th>商户ID</th><th>商户名称</th><th>交易总数</th><th>成功数</th><th>成功率</th></tr></thead>
                    <tbody>
                        <tr th:each="s : ${merchantSummary}">
                            <td><code th:text="${s['merchantId']}"></code></td>
                            <td th:text="${s['merchantName']}"></td>
                            <td th:text="${s['totalCount']}"></td>
                            <td th:text="${s['successCount']}"></td>
                            <td th:text="${s['successRate']} + '%'"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Channel Summary -->
    <div class="card card-dark mb-4">
        <div class="card-header"><i class="bi bi-diagram-3 me-1"></i> 通道交易汇总</div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark-custom mb-0" id="channelTable">
                    <thead><tr><th>通道ID</th><th>通道名称</th><th>交易总数</th></tr></thead>
                    <tbody>
                        <tr th:each="s : ${channelSummary}">
                            <td><code th:text="${s['channelId']}"></code></td>
                            <td th:text="${s['channelName']}"></td>
                            <td th:text="${s['totalCount']}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div class="row g-3">
        <div class="col-lg-6">
            <div class="card card-dark">
                <div class="card-header">商户交易分布</div>
                <div class="card-body"><canvas id="merchantChart" height="200"></canvas></div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card card-dark">
                <div class="card-header">通道交易分布</div>
                <div class="card-body"><canvas id="channelChart" height="200"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const mSummary = /*[[${merchantSummary}]]*/ [];
    const cSummary = /*[[${channelSummary}]]*/ [];

    new Chart(document.getElementById('merchantChart'), {
        type: 'bar',
        data: {
            labels: mSummary.map(s => s.merchantName),
            datasets: [{
                label: '交易数',
                data: mSummary.map(s => s.totalCount),
                backgroundColor: '#6366f1'
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' }, beginAtZero: true }
            }
        }
    });

    new Chart(document.getElementById('channelChart'), {
        type: 'doughnut',
        data: {
            labels: cSummary.map(s => s.channelName),
            datasets: [{
                data: cSummary.map(s => s.totalCount),
                backgroundColor: ['#6366f1', '#22c55e', '#eab308', '#3b82f6', '#ef4444']
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 12, usePointStyle: true } } }
        }
    });
</script>
<script>
function exportTable(tableId, filename) {
    const table = document.getElementById(tableId);
    let csv = [];
    const rows = table.querySelectorAll('tr');
    for (const row of rows) {
        const cols = row.querySelectorAll('td, th');
        const rowData = [];
        for (const col of cols) { rowData.push('"' + col.textContent.trim().replace(/"/g, '""') + '"'); }
        csv.push(rowData.join(','));
    }
    const blob = new Blob(['\ufeff' + csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
}
function exportMerchantCSV() { exportTable('merchantTable', 'merchant_report_' + new Date().toISOString().slice(0,10) + '.csv'); }
function exportChannelCSV() { exportTable('channelTable', 'channel_report_' + new Date().toISOString().slice(0,10) + '.csv'); }
</script>
</body>
</html>
